<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>agency-agents WebUI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #0f172a; color: #f1f5f9; }
        .app { display: flex; height: 100vh; }
        .sidebar { width: 280px; background: #1e293b; border-right: 1px solid #475569; overflow-y: auto; }
        .sidebar-header { padding: 16px; border-bottom: 1px solid #475569; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header h2 { font-size: 16px; }
        .tool-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #334155; }
        .tool-item:hover { background: #334155; }
        .tool-item.active { background: rgba(99,102,241,0.2); border-left: 3px solid #6366f1; }
        .tool-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
        .tool-status { font-size: 12px; color: #94a3b8; margin-bottom: 8px; }
        .tool-actions { display: flex; gap: 4px; flex-wrap: wrap; }
        .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 16px; background: #1e293b; border-bottom: 1px solid #475569; display: flex; justify-content: space-between; align-items: center; }
        .filters { padding: 12px 16px; background: #1e293b; border-bottom: 1px solid #475569; display: flex; gap: 8px; align-items: center; }
        .filter-btn { padding: 6px 12px; border: none; border-radius: 6px; background: #334155; color: #f1f5f9; cursor: pointer; font-size: 12px; }
        .filter-btn.active { background: #6366f1; }
        .agent-list { flex: 1; overflow-y: auto; padding: 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; align-content: start; }
        .agent-card { background: #1e293b; border: 1px solid #475569; border-radius: 8px; padding: 14px; }
        .agent-card:hover { border-color: #6366f1; }
        .agent-title { font-weight: 600; margin-bottom: 6px; }
        .agent-category { font-size: 12px; color: #94a3b8; margin-bottom: 8px; }
        .agent-id { font-size: 11px; color: #64748b; font-family: monospace; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; margin-left: 8px; }
        .badge-installed { background: #10b981; color: white; }
        .badge-active { background: #6366f1; color: white; }
        .agent-actions { margin-top: 10px; display: flex; gap: 6px; }
        .btn { padding: 4px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; color: white; }
        .btn-primary { background: #6366f1; }
        .btn-success { background: #10b981; }
        .btn-warning { background: #f59e0b; }
        .btn-danger { background: #ef4444; }
        .btn-default { background: #475569; }
        .empty { color: #94a3b8; text-align: center; padding: 40px; grid-column: 1/-1; }
        .active-bar { padding: 12px 16px; background: #1e293b; border-bottom: 1px solid #475569; display: flex; justify-content: space-between; align-items: center; }
        .active-label { font-size: 12px; color: #94a3b8; }
        .active-name { font-weight: 600; color: #6366f1; }
        .search-input { margin-left: auto; padding: 6px 10px; background: #334155; border: 1px solid #475569; border-radius: 6px; color: #f1f5f9; font-size: 12px; }
        .dept-tags { padding: 8px 16px; display: none; flex-wrap: wrap; gap: 6px; background: #1e293b; border-bottom: 1px solid #475569; }
        .dept-tag { padding: 4px 10px; border-radius: 16px; font-size: 11px; background: #334155; color: #94a3b8; cursor: pointer; border: none; }
        .dept-tag.active { background: #6366f1; color: white; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { background: #1e293b; border-radius: 12px; width: 90%; max-width: 800px; max-height: 80vh; display: flex; flex-direction: column; }
        .modal-header { padding: 16px; border-bottom: 1px solid #475569; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 16px; overflow-y: auto; flex: 1; }
        .modal-footer { padding: 16px; border-top: 1px solid #475569; display: flex; justify-content: flex-end; gap: 8px; }
        .progress-bar { height: 6px; background: #334155; border-radius: 3px; overflow: hidden; margin-bottom: 12px; }
        .progress-fill { height: 100%; background: #6366f1; width: 0%; }
        .log-box { background: #0f172a; padding: 12px; border-radius: 6px; max-height: 40vh; overflow-y: auto; font-family: monospace; font-size: 12px; white-space: pre-wrap; word-break: break-all; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #1e293b; border: 1px solid #475569; border-radius: 8px; padding: 12px 16px; z-index: 2000; display: none; }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>🎭 工具分区</h2>
                <button class="btn btn-default" onclick="loadAll()">刷新</button>
            </div>
            <div id="toolList"></div>
        </aside>
        <main class="content">
            <div class="header">
                <h1>agency-agents WebUI</h1>
                <span id="url"></span>
            </div>
            <div class="active-bar">
                <div>
                    <div class="active-label">当前激活</div>
                    <div class="active-name" id="activeAgent">未激活</div>
                </div>
                <button class="btn btn-default" id="deactivateBtn" onclick="doDeactivate()" style="display:none">停用</button>
            </div>
            <div class="filters">
                <button class="filter-btn active" onclick="setFilter('installed')">已安装 (<span id="installedCount">0</span>)</button>
                <button class="filter-btn" onclick="setFilter('all')">全部</button>
                <button class="filter-btn" onclick="setFilter('category')">按部门</button>
                <input type="text" class="search-input" id="search" placeholder="搜索..." oninput="renderAgents()">
            </div>
            <div class="dept-tags" id="deptTags"></div>
            <div class="agent-list" id="agentList"></div>
        </main>
    </div>
    
    <!-- 安装进度弹窗 -->
    <div class="modal-overlay" id="installModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="installTitle">安装进度</h3>
                <button onclick="closeModal('installModal')" style="background:none;border:none;color:#f1f5f9;cursor:pointer;font-size:18px">✕</button>
            </div>
            <div class="modal-body">
                <div class="progress-bar"><div class="progress-fill" id="installProgress"></div></div>
                <div id="installStatus" style="margin-bottom:8px;font-size:13px;color:#94a3b8">准备中...</div>
                <div class="log-box" id="installLog"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="closeModal('installModal')">关闭</button>
            </div>
        </div>
    </div>
    
    <!-- 详情弹窗 -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="detailTitle">详情</h3>
                <button onclick="closeModal('detailModal')" style="background:none;border:none;color:#f1f5f9;cursor:pointer;font-size:18px">✕</button>
            </div>
            <div class="modal-body"><div class="log-box" id="detailContent"></div></div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="closeModal('detailModal')">关闭</button>
                <button class="btn btn-primary" onclick="copyDetail()">复制</button>
            </div>
        </div>
    </div>
    
    <!-- 日志弹窗 -->
    <div class="modal-overlay" id="logModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="logTitle">日志</h3>
                <button onclick="closeModal('logModal')" style="background:none;border:none;color:#f1f5f9;cursor:pointer;font-size:18px">✕</button>
            </div>
            <div class="modal-body" id="logContent"></div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="closeModal('logModal')">关闭</button>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
    (function() {
        var tools = {};
        var agents = {};
        var depts = {};
        var active = {};
        var currentTool = null;
        var filter = 'installed';
        var currentDept = 'all';
        
        // 初始化
        window.onload = function() {
            document.getElementById('url').textContent = location.origin;
            loadAll();
            setInterval(loadAll, 10000);
        };
        
        // 加载所有数据
        window.loadAll = function() {
            Promise.all([
                fetch('/api/tools').then(function(r) { return r.json(); }),
                fetch('/api/agents').then(function(r) { return r.json(); }),
                fetch('/api/active-agents').then(function(r) { return r.json(); })
            ]).then(function(results) {
                tools = results[0].tools;
                agents = results[1].agents;
                depts = results[1].departments;
                active = results[2];
                renderTools();
                if (!currentTool) {
                    var keys = Object.keys(tools);
                    for (var i = 0; i < keys.length; i++) {
                        if (tools[keys[i]].installed) {
                            selectTool(keys[i]);
                            break;
                        }
                    }
                    if (!currentTool && keys.length > 0) selectTool(keys[0]);
                } else {
                    renderAgents();
                }
            });
        };
        
        // 渲染工具列表
        function renderTools() {
            var el = document.getElementById('toolList');
            var html = '';
            var sorted = Object.keys(tools).sort(function(a, b) {
                return (tools[b].installed - tools[a].installed) || (tools[b].running - tools[a].running);
            });
            for (var i = 0; i < sorted.length; i++) {
                var name = sorted[i];
                var t = tools[name];
                var status = t.running ? '🟢 运行中' : (t.installed ? '🔵 已安装' : '⚪ 未安装');
                html += '<div class="tool-item ' + (currentTool === name ? 'active' : '') + '" onclick="selectTool(\'' + name + '\')">';
                html += '<div class="tool-name">' + t.name + '</div>';
                html += '<div class="tool-status">' + status + ' · ' + t.agent_count + '个智能体</div>';
                html += '<div class="tool-actions">';
                if (!t.installed) {
                    html += '<button class="btn btn-success" onclick="event.stopPropagation(); doInstall(\'' + name + '\')">安装</button>';
                }
                if (t.can_start && !t.running) {
                    html += '<button class="btn btn-success" onclick="event.stopPropagation(); doStart(\'' + name + '\')">启动</button>';
                }
                if (t.can_stop && t.running) {
                    html += '<button class="btn btn-warning" onclick="event.stopPropagation(); doStop(\'' + name + '\')">停止</button>';
                }
                if (t.can_restart) {
                    html += '<button class="btn btn-default" onclick="event.stopPropagation(); doRestart(\'' + name + '\')">重启</button>';
                }
                if (t.has_web && t.running) {
                    html += '<button class="btn btn-primary" onclick="event.stopPropagation(); window.open(\'' + t.web_url + '\')">打开</button>';
                }
                html += '<button class="btn btn-default" onclick="event.stopPropagation(); showLogs(\'' + name + '\')">日志</button>';
                html += '</div></div>';
            }
            el.innerHTML = html;
        }
        
        // 选择工具
        window.selectTool = function(name) {
            currentTool = name;
            filter = 'installed';
            currentDept = 'all';
            renderTools();
            renderAgents();
        };
        
        // 设置筛选
        window.setFilter = function(f) {
            filter = f;
            var btns = document.querySelectorAll('.filter-btn');
            var filters = ['installed', 'all', 'category'];
            for (var i = 0; i < btns.length; i++) {
                btns[i].className = 'filter-btn' + (filters[i] === f ? ' active' : '');
            }
            renderAgents();
        };
        
        // 渲染智能体
        function renderAgents() {
            if (!currentTool) {
                document.getElementById('agentList').innerHTML = '<div class="empty">请选择工具</div>';
                return;
            }
            var tool = tools[currentTool];
            document.getElementById('installedCount').textContent = tool.agent_count;
            
            var ac = active[currentTool];
            document.getElementById('activeAgent').textContent = ac ? (ac.agent + ' (' + tool.name + ')') : '未激活';
            document.getElementById('deactivateBtn').style.display = ac ? 'block' : 'none';
            
            var deptEl = document.getElementById('deptTags');
            if (filter === 'category') {
                deptEl.style.display = 'flex';
                var dhtml = '<button class="dept-tag ' + (currentDept === 'all' ? 'active' : '') + '" onclick="selectDept(\'all\')">全部</button>';
                var dk = Object.keys(depts);
                for (var i = 0; i < dk.length; i++) {
                    if (depts[dk[i]].length > 0) {
                        dhtml += '<button class="dept-tag ' + (currentDept === dk[i] ? 'active' : '') + '" onclick="selectDept(\'' + dk[i] + '\')">' + dk[i] + '</button>';
                    }
                }
                deptEl.innerHTML = dhtml;
            } else {
                deptEl.style.display = 'none';
            }
            
            var items = Object.keys(agents);
            var filtered = [];
            for (var i = 0; i < items.length; i++) {
                var id = items[i];
                var a = agents[id];
                if (filter === 'installed' && tool.agents.indexOf(id) === -1) continue;
                if (filter === 'category' && currentDept !== 'all' && a.category !== currentDept) continue;
                var search = document.getElementById('search').value.toLowerCase();
                if (search && id.indexOf(search) === -1 && a.name.indexOf(search) === -1 && a.category.indexOf(search) === -1) continue;
                filtered.push({id: id, agent: a});
            }
            
            var list = document.getElementById('agentList');
            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty">暂无智能体</div>';
                return;
            }
            
            var html = '';
            for (var i = 0; i < filtered.length; i++) {
                var id = filtered[i].id;
                var a = filtered[i].agent;
                var installed = tool.agents.indexOf(id) !== -1;
                var isActive = ac && ac.agent === id;
                html += '<div class="agent-card">';
                html += '<div class="agent-title">' + a.name;
                if (isActive) html += '<span class="badge badge-active">激活</span>';
                else if (installed) html += '<span class="badge badge-installed">已安装</span>';
                html += '</div>';
                html += '<div class="agent-category">' + a.category + '</div>';
                html += '<div class="agent-id">' + id + '</div>';
                html += '<div class="agent-actions">';
                html += '<button class="btn btn-default" onclick="viewAgent(\'' + id + '\')">查看</button>';
                if (installed) {
                    html += '<button class="btn btn-primary" onclick="doToggle(\'' + id + '\')">' + (isActive ? '已激活' : '激活') + '</button>';
                    html += '<button class="btn btn-danger" onclick="doUninstall(\'' + id + '\')">卸载</button>';
                } else {
                    html += '<button class="btn btn-success" onclick="doInstallAgent(\'' + id + '\')">安装</button>';
                }
                html += '</div></div>';
            }
            list.innerHTML = html;
        }
        
        window.selectDept = function(d) { currentDept = d; renderAgents(); };
        window.renderAgents = renderAgents;
        
        // 安装工具
        window.doInstall = function(name) {
            var tool = tools[name];
            if (!tool) { showToast('工具不存在'); return; }
            if (!confirm('确定安装 ' + tool.name + '？')) return;
            
            var modal = document.getElementById('installModal');
            document.getElementById('installTitle').textContent = '安装 ' + tool.name;
            document.getElementById('installProgress').style.width = '5%';
            document.getElementById('installProgress').style.background = '#6366f1';
            document.getElementById('installStatus').textContent = '正在启动安装任务...';
            document.getElementById('installStatus').style.color = '#94a3b8';
            document.getElementById('installLog').textContent = '';
            modal.style.display = 'flex';
            
            fetch('/api/install/' + name, {method: 'POST'})
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.success) {
                        document.getElementById('installStatus').textContent = '安装进行中...';
                        pollInstall(data.task_id);
                    } else {
                        modal.style.display = 'none';
                        showToast('安装失败: ' + (data.message || '未知错误'));
                    }
                })
                .catch(function(e) {
                    modal.style.display = 'none';
                    showToast('安装请求失败');
                });
        };
        
        function pollInstall(taskId) {
            fetch('/api/install/status/' + taskId)
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    var logEl = document.getElementById('installLog');
                    var statusEl = document.getElementById('installStatus');
                    var progressEl = document.getElementById('installProgress');
                    
                    if (data.log) {
                        logEl.textContent = data.log;
                        logEl.scrollTop = logEl.scrollHeight;
                    }
                    
                    if (data.status === 'running') {
                        var progress = 10;
                        if (data.log && data.log.indexOf('convert') !== -1) progress = 30;
                        if (data.log && data.log.indexOf('install') !== -1) progress = 60;
                        if (data.log && data.log.indexOf('copy') !== -1) progress = 80;
                        progressEl.style.width = progress + '%';
                        statusEl.textContent = '安装进行中...';
                        setTimeout(function() { pollInstall(taskId); }, 300);
                    } else if (data.status === 'completed') {
                        progressEl.style.width = '100%';
                        statusEl.textContent = '✅ 安装完成！';
                        statusEl.style.color = '#10b981';
                        showToast('安装完成');
                        setTimeout(function() { closeModal('installModal'); loadAll(); }, 1500);
                    } else if (data.status === 'failed') {
                        progressEl.style.width = '100%';
                        progressEl.style.background = '#ef4444';
                        statusEl.textContent = '❌ 安装失败';
                        statusEl.style.color = '#ef4444';
                        showToast('安装失败');
                    } else {
                        setTimeout(function() { pollInstall(taskId); }, 300);
                    }
                });
        }
        
        // 工具控制
        window.doStart = function(name) {
            fetch('/api/tool/' + name + '/start', {method: 'POST'}).then(function(r) { return r.json(); }).then(function(data) {
                showToast(data.message);
                loadAll();
            });
        };
        window.doStop = function(name) {
            fetch('/api/tool/' + name + '/stop', {method: 'POST'}).then(function(r) { return r.json(); }).then(function(data) {
                showToast(data.message);
                loadAll();
            });
        };
        window.doRestart = function(name) {
            fetch('/api/tool/' + name + '/restart', {method: 'POST'}).then(function(r) { return r.json(); }).then(function(data) {
                showToast(data.message);
                loadAll();
            });
        };
        
        // 日志
        window.showLogs = function(name) {
            fetch('/api/logs/' + name).then(function(r) { return r.json(); }).then(function(data) {
                document.getElementById('logTitle').textContent = tools[name].name + ' 日志';
                var html = '';
                if (data.logs && data.logs.length) {
                    for (var i = 0; i < data.logs.length; i++) {
                        html += '<div style="margin-bottom:12px"><strong>' + data.logs[i].file + '</strong><div class="log-box">' + data.logs[i].content + '</div></div>';
                    }
                } else {
                    html = '<div class="empty">暂无日志</div>';
                }
                document.getElementById('logContent').innerHTML = html;
                document.getElementById('logModal').style.display = 'flex';
            });
        };
        
        // 智能体操作
        window.doToggle = function(id) {
            fetch('/api/active-agents/' + currentTool + '/' + id, {method: 'POST'}).then(function(r) { return r.json(); }).then(function(data) {
                if (data.success) {
                    active[currentTool] = {agent: id};
                    showToast(data.message);
                    renderAgents();
                }
            });
        };
        window.doDeactivate = function() {
            fetch('/api/active-agents/' + currentTool, {method: 'DELETE'}).then(function(r) { return r.json(); }).then(function(data) {
                if (data.success) {
                    active[currentTool] = null;
                    showToast(data.message);
                    renderAgents();
                }
            });
        };
        window.doInstallAgent = function(id) {
            if (!currentTool) {
                showToast('请先选择工具');
                return;
            }
            var tool = tools[currentTool];
            if (!tool.installed) {
                // 工具未安装，先安装工具
                doInstall(currentTool);
            } else {
                showToast('该智能体需要通过工具安装脚本安装');
            }
        };
        window.doUninstall = function(id) {
            if (!confirm('确定卸载 ' + id + '？')) return;
            showToast('卸载功能开发中');
        };
        
        // 查看详情
        window.viewAgent = function(id) {
            fetch('/api/agent/' + id).then(function(r) { return r.json(); }).then(function(data) {
                document.getElementById('detailTitle').textContent = data.id + ' (' + data.file + ')';
                document.getElementById('detailContent').textContent = data.content;
                document.getElementById('detailModal').style.display = 'flex';
            });
        };
        window.copyDetail = function() {
            navigator.clipboard.writeText(document.getElementById('detailContent').textContent);
            showToast('已复制');
        };
        
        // 关闭弹窗
        window.closeModal = function(id) {
            document.getElementById(id).style.display = 'none';
        };
        
        // Toast
        function showToast(msg) {
            var el = document.getElementById('toast');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(function() { el.style.display = 'none'; }, 2000);
        }
        window.showToast = showToast;
    })();
    </script>
</body>
</html>
